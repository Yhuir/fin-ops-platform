<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>银企核销工作台原型 V2</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --line: #d8e1eb;
      --line-soft: #e9eef5;
      --text: #243b53;
      --muted: #5d6d7e;
      --blue: #0f4c81;
      --blue-soft: #eaf3ff;
      --green: #206a46;
      --green-soft: #ebf8f0;
      --amber: #9a6700;
      --amber-soft: #fff8e5;
      --red: #b42318;
      --red-soft: #fff0ee;
      --purple: #6b21a8;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 76, 129, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(32, 106, 70, 0.08), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    .app {
      min-height: 100vh;
      padding: 22px;
    }

    .shell {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f9fbfe 0%, #f2f6fa 100%);
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      align-items: center;
    }

    .month-btn,
    .ghost-btn,
    .primary-btn,
    .toggle-btn,
    .chip-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 36px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .toggle-btn.active,
    .chip-btn.active {
      background: var(--blue-soft);
      border-color: #cfe0ff;
      color: #164c9b;
    }

    .month-input {
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      outline: none;
      width: 96px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
      flex-wrap: wrap;
    }

    .toolbar-left,
    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--muted);
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      min-width: 170px;
      font-size: 12px;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 16px 14px;
      background: linear-gradient(180deg, #f9fbfe 0%, #f2f6fa 100%);
      border-bottom: 1px solid var(--line);
    }

    .stat {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 11px;
      font-weight: 800;
      color: var(--text);
    }

    .stat.good {
      background: var(--green-soft);
      border-color: #cde8d7;
      color: var(--green);
    }

    .stat.warn {
      background: var(--amber-soft);
      border-color: #f0d8a2;
      color: var(--amber);
    }

    .zones {
      padding: 14px;
      display: grid;
      gap: 14px;
    }

    .zone {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .zone-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
    }

    .zone-head.top {
      background: var(--green-soft);
      color: var(--green);
    }

    .zone-head.bottom {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .zone-meta {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.85;
    }

    .tri-layout {
      display: grid;
      gap: 0;
      background: #fff;
      min-height: 0;
    }

    .pane {
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--line);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane.is-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splitter {
      width: 10px;
      min-width: 10px;
      background:
        linear-gradient(180deg, #eef3f8 0%, #e3ebf4 100%);
      border-left: 1px solid #d7e0ea;
      border-right: 1px solid #d7e0ea;
      position: relative;
      cursor: col-resize;
    }

    .splitter.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .splitter::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 40px;
      border-radius: 999px;
      background:
        repeating-linear-gradient(
          180deg,
          #90a4b8 0 3px,
          transparent 3px 6px
        );
    }

    .pane-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px 10px 8px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      font-size: 12px;
      font-weight: 800;
    }

    .pane-head.oa {
      color: #7c4d00;
    }

    .pane-head.bank {
      color: var(--blue);
    }

    .pane-head.invoice {
      color: var(--purple);
    }

    .pane-tag {
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 10px;
      color: var(--muted);
    }

    .table-wrap {
      overflow: auto;
      max-height: 230px;
    }

    .zone.open-zone .table-wrap {
      max-height: 360px;
    }

    table {
      border-collapse: separate;
      border-spacing: 0;
      min-width: 100%;
      width: max-content;
      font-size: 11px;
    }

    th,
    td {
      padding: 8px 8px;
      white-space: nowrap;
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
      background: #fff;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f3f6fb;
      color: var(--muted);
      font-weight: 800;
      text-align: left;
    }

    td:last-child,
    th:last-child {
      border-right: 0;
    }

    tr.row-open td {
      background: #fffef9;
    }

    tr.row-paired td {
      background: #f7fcf9;
    }

    tr.row-linked td {
      background: #edf4ff;
      box-shadow: inset 3px 0 0 #2c64d8;
    }

    tr.row-selected td {
      background: #dfeaff;
      box-shadow:
        inset 3px 0 0 #0f4c81,
        inset 0 0 0 1px #bfd4fb;
    }

    tr:hover td {
      background: #f7faff;
    }

    tr[data-row] {
      cursor: pointer;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 800;
    }

    .badge.good {
      background: #daf5e5;
      color: #136f3a;
    }

    .badge.warn {
      background: #fff1cc;
      color: #a25a00;
    }

    .badge.risk {
      background: #ffe1dc;
      color: var(--red);
    }

    .bank-pill {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #cfd9e4;
      background: #fff;
      font-size: 10px;
      font-weight: 800;
      color: #39506a;
    }

    .inline-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .mini-btn,
    .mini-select {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      padding: 0 8px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
    }

    .mini-btn.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .mini-btn.danger {
      background: #fff5f3;
      color: var(--red);
      border-color: #f2c5bf;
    }

    .mini-select {
      min-width: 96px;
      justify-content: space-between;
    }

    .table-footer {
      padding: 7px 8px;
      font-size: 10px;
      color: #758395;
      background: #fbfcfe;
      border-top: 1px dashed var(--line-soft);
    }

    .drawer {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 420px;
      max-width: calc(100vw - 48px);
      height: calc(100vh - 48px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.22);
      transform: translateX(calc(100% + 36px));
      transition: transform 0.22s ease;
      z-index: 30;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body.has-context-panel .drawer {
      right: 400px;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .context-panel {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 352px;
      max-width: calc(100vw - 48px);
      height: calc(100vh - 48px);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.18);
      transform: translateX(calc(100% + 36px));
      transition: transform 0.22s ease;
      z-index: 26;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .context-panel.open {
      transform: translateX(0);
    }

    .context-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfdff 0%, #f4f7fb 100%);
    }

    .context-title {
      font-size: 15px;
      font-weight: 800;
    }

    .context-subtitle {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
    }

    .context-body {
      padding: 16px 18px 20px;
      overflow: auto;
      display: grid;
      gap: 14px;
    }

    .context-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      overflow: hidden;
    }

    .context-card-head {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .context-card-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .selection-group {
      display: grid;
      gap: 8px;
    }

    .selection-label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
    }

    .selection-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .selection-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: #fbfcfe;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
    }

    .selection-chip button {
      border: 0;
      background: transparent;
      color: #7b8794;
      cursor: pointer;
      font-size: 11px;
      padding: 0;
    }

    .selection-empty {
      font-size: 12px;
      color: var(--muted);
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
      gap: 8px;
    }

    .mode-tab {
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      cursor: pointer;
    }

    .mode-tab.active {
      background: var(--blue-soft);
      border-color: #cfe0ff;
      color: #164c9b;
    }

    .context-form {
      display: grid;
      gap: 10px;
    }

    .context-input,
    .context-select,
    .context-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 9px 10px;
    }

    .context-textarea {
      min-height: 92px;
      resize: vertical;
    }

    .context-help {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .context-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      background: #fbfcfe;
      padding: 10px;
      display: grid;
      gap: 5px;
    }

    .history-item strong {
      font-size: 12px;
    }

    .history-item span {
      font-size: 11px;
      color: var(--muted);
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fbfdff 0%, #f4f7fb 100%);
    }

    .drawer-title {
      font-size: 16px;
      font-weight: 800;
    }

    .drawer-subtitle {
      margin-top: 5px;
      font-size: 12px;
      color: var(--muted);
    }

    .drawer-body {
      padding: 16px 18px 22px;
      overflow: auto;
      display: grid;
      gap: 16px;
    }

    .drawer-section {
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .drawer-section h3 {
      margin: 0;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 800;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .detail-item {
      padding: 10px 12px;
      border-right: 1px solid var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
      min-width: 0;
    }

    .detail-item:nth-child(2n) {
      border-right: 0;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .detail-value {
      font-size: 12px;
      color: var(--text);
      line-height: 1.45;
      word-break: break-all;
    }

    .drawer-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .tax-page-body {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .tax-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
      padding: 14px;
    }

    .summary-card .label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .summary-card .value {
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
    }

    .summary-card .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .tax-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 300px;
      gap: 12px;
    }

    .tax-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .tax-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
      font-size: 12px;
      font-weight: 800;
    }

    .tax-result {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .ledger-page-body {
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .ledger-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(300px, 0.9fr);
      gap: 12px;
    }

    .ledger-stack {
      display: grid;
      gap: 12px;
    }

    .ledger-panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }

    .ledger-panel-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .ledger-hint {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .ledger-kpis {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .ledger-kpi {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: #fbfcff;
      padding: 12px;
    }

    .ledger-kpi .label {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .ledger-kpi .value {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
    }

    .ledger-kpi .hint {
      margin-top: 6px;
      font-size: 11px;
      color: var(--muted);
    }

    .status-select {
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .mini-btn.soft {
      background: var(--blue-soft);
      color: #164c9b;
      border-color: #cfe0ff;
    }

    .reminder-item {
      border: 1px solid var(--line-soft);
      border-radius: 14px;
      background: #fbfcfe;
      padding: 12px;
      display: grid;
      gap: 6px;
    }

    .reminder-item strong {
      font-size: 12px;
    }

    .reminder-item span {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.45;
    }

    .page-empty {
      padding: 18px;
      border: 1px dashed var(--line);
      border-radius: 14px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .result-box {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fbfcff;
    }

    .result-box strong {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
    }

    .result-box .big {
      font-size: 22px;
      font-weight: 800;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(36, 59, 83, 0.95);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      pointer-events: none;
      transition: all 0.18s ease;
      z-index: 40;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1280px) {
      .tax-grid {
        grid-template-columns: 1fr;
      }

      .tax-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .ledger-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 920px) {
      .app {
        padding: 12px;
      }

      .topbar,
      .toolbar,
      .stats {
        padding-left: 12px;
        padding-right: 12px;
      }

      .drawer {
        top: 12px;

        payment_reminder: "待付款提醒",
        external_receivable_payable: "外部往来登记",
        non_tax_income: "非税收入登记"
      };
      return labels[value] || value || "—";
    }

    function ledgerStatusBadge(status) {
      const map = {
        open: { text: "待处理", tone: "warn" },
        in_progress: { text: "跟进中", tone: "good" },
        waiting_external_feedback: { text: "待外部反馈", tone: "warn" },
        resolved: { text: "已解决", tone: "good" },
        cancelled: { text: "已取消", tone: "risk" }
      };
      return badgeHtml(map[status] || { text: status || "—", tone: "warn" });
    }

    function reminderStatusBadge(status) {
      const map = {
        pending: { text: "待发送", tone: "warn" },
        sent: { text: "已发送", tone: "good" },
        skipped: { text: "已跳过", tone: "warn" },
        cancelled: { text: "已取消", tone: "risk" }
      };
      return badgeHtml(map[status] || { text: status || "—", tone: "warn" });
    }

    function oaSyncStatusBadge(status) {
      const map = {
        succeeded: { text: "成功", tone: "good" },
        partial: { text: "部分成功", tone: "warn" },
        failed: { text: "失败", tone: "risk" }
      };
      return badgeHtml(map[status] || { text: status || "—", tone: "warn" });
    }

    function getAllRows() {
      const data = getMonthBundle();
      return [
        ...data.paired.oa, ...data.paired.bank, ...data.paired.invoice,
        ...data.open.oa, ...data.open.bank, ...data.open.invoice
      ];
    }

    function getLedgerBundle() {
      const hasServerData = state.ledgerData.all.length > 0 || state.ledgerData.remindersPending.length > 0 || state.ledgerData.remindersSent.length > 0;
      return hasServerData
        ? { ...state.ledgerData, source: "api" }
        : { ...ledgerMockData, source: "mock" };
    }

    function getOABundle() {
      const hasServerData = state.oaData && state.oaData.summary;
      return hasServerData
        ? { ...state.oaData, source: "api" }
        : { ...oaMockData, source: "mock" };
    }

    function getProjectBundle() {
      const hasServerData = state.projectData && (
        (state.projectData.projects || []).length > 0
        || (state.projectData.assignable_objects || []).length > 0
        || (state.projectData.summaries || []).length > 0
      );
      return hasServerData
        ? { ...state.projectData, source: "api" }
        : { ...projectMockData, source: "mock" };
    }

    function hasLiveLedgerData() {
      return getLedgerBundle().source === "api";
    }

    function hasLiveOAData() {
      return getOABundle().source === "api";
    }

    function hasLiveProjectData() {
      return getProjectBundle().source === "api";
    }

    function getRowById(rowId) {
      return getAllRows().find(item => item.id === rowId);
    }

    function getSelectedRows(type) {
      return state.selectedRows[type]
        .map(getRowById)
        .filter(Boolean);
    }

    function getAllSelectedRows() {
      return [
        ...getSelectedRows("oa"),
        ...getSelectedRows("bank"),
        ...getSelectedRows("invoice")
      ];
    }

    function getSelectedLinkIds() {
      return new Set(
        getAllSelectedRows()
          .map(row => row.caseId || row.candidateResultId)
          .filter(Boolean)
      );
    }

    function sanitizeSelections() {
      ["oa", "bank", "invoice"].forEach(type => {
        state.selectedRows[type] = state.selectedRows[type].filter(rowId => Boolean(getRowById(rowId)));
      });
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function openDrawer(target) {
      const row = typeof target === "string" ? getRowById(target) : target;
      if (!row) return;
      state.drawerRow = row;
      state.drawerOpen = true;
      renderDrawer();
    }

    function closeDrawer() {
      state.drawerOpen = false;
      renderDrawer();
    }

    function toggleRowSelection(rowId) {
      const row = getRowById(rowId);
      if (!row) return;
      const bucket = state.selectedRows[row.type];
      if (bucket.includes(rowId)) {
        state.selectedRows[row.type] = bucket.filter(item => item !== rowId);
      } else {
        state.selectedRows[row.type] = [...bucket, rowId];
      }
      if ((row.type === "bank" || row.type === "invoice") && !state.form.exceptionCode) {
        state.form.exceptionCode = getDefaultExceptionCode();
      }
      render();
    }

    function clearSelections() {
      state.selectedRows = { oa: [], bank: [], invoice: [] };
      render();
    }

    function removeSelection(type, rowId) {
      state.selectedRows[type] = state.selectedRows[type].filter(item => item !== rowId);
      render();
    }

    function ensureSelected(rowId) {
      const row = getRowById(rowId);
      if (!row) return;
      if (!state.selectedRows[row.type].includes(rowId)) {
        state.selectedRows[row.type] = [...state.selectedRows[row.type], rowId];
      }
    }

    function autoSelectCandidates(row) {
      if (!row) return;
      if (row.type === "bank" && row.candidateInvoiceIds) {
        state.selectedRows.invoice = [...new Set([...state.selectedRows.invoice, ...row.candidateInvoiceIds])];
      }
      if (row.type === "invoice" && row.candidateTransactionIds) {
        state.selectedRows.bank = [...new Set([...state.selectedRows.bank, ...row.candidateTransactionIds])];
      }
    }

    function prepareConfirm(rowId) {
      const row = getRowById(rowId);
      if (!row) return;
      ensureSelected(rowId);
      autoSelectCandidates(row);
      state.contextMode = "confirm";
      render();
      showToast("已带入右侧操作区，可直接确认关联");
    }

    function prepareException(rowId) {
      ensureSelected(rowId);
      state.contextMode = "exception";
      state.form.exceptionCode = getDefaultExceptionCode();
      render();
    }

    function prepareRelation(rowId) {
      const row = getRowById(rowId);
      if (!row) return;
      ensureSelected(rowId);
      autoSelectCandidates(row);
      state.contextMode = "confirm";
      render();
      showToast("已加载候选关联，请在右侧操作区确认");
    }

    function handleAction(rowId, action) {
      const row = getRowById(rowId);
      if (!row) return;
      if (action === "detail") {
        openDrawer(rowId);
        return;
      }
      if (action === "confirm") {
        prepareConfirm(rowId);
        return;
      }
      if (action === "exception") {
        prepareException(rowId);
        return;
      }
      if (action === "relation") {
        prepareRelation(rowId);
        return;
      }
      if (action === "cancel") {
        showToast("当前版本暂未开放取消关联");
      }
    }

    function inferBizSide() {
      const invoice = getSelectedRows("invoice")[0];
      if (invoice) return invoice.bizSide || (String(invoice.invoiceType || "").includes("销项") ? "receivable" : "payable");
      const bank = getSelectedRows("bank")[0];
      if (bank) return bank.bizSide || (bank.credit !== "" ? "receivable" : "payable");
      return "receivable";
    }

    function getContextOptions() {
      return getMonthBundle().contextOptions || DEFAULT_CONTEXT_OPTIONS;
    }

    function getDefaultExceptionCode() {
      const options = inferBizSide() === "receivable"
        ? getContextOptions().receivable_exceptions
        : getContextOptions().payable_exceptions;
      return options[0] ? options[0].code : "";
    }

    function getSelectedOffsetInvoiceBuckets() {
      const invoices = getSelectedRows("invoice");
      return {
        receivable: invoices.filter(row => String(row.invoiceType || "").includes("销项")),
        payable: invoices.filter(row => String(row.invoiceType || "").includes("进项"))
      };
    }

    function getCommonSourceResultId() {
      const resultIds = getAllSelectedRows()
        .map(row => row.candidateResultId)
        .filter(Boolean);
      if (resultIds.length === 0) return null;
      return Array.from(new Set(resultIds))[0];
    }

    async function loadWorkbench(month) {
      state.loadingWorkbench = true;
      state.workbenchError = "";
      render();
      try {
        state.workbenchCache[month] = await fetchJson(`/workbench?month=${encodeURIComponent(month)}`);
      } catch (error) {
        state.workbenchError = error.message || "工作台接口加载失败";
      } finally {
        state.loadingWorkbench = false;
        sanitizeSelections();
        render();
      }
    }

    async function loadLedgerHub() {
      state.loadingLedgers = true;
      state.ledgerError = "";
      render();
      const asOf = getMonthEnd(state.currentMonth);
      try {
        const [allPayload, openPayload, duePayload, overduePayload, pendingPayload, sentPayload] = await Promise.all([
          fetchJson("/ledgers?view=all"),
          fetchJson("/ledgers?view=open"),
          fetchJson(`/ledgers?view=due&as_of=${encodeURIComponent(asOf)}`),
          fetchJson(`/ledgers?view=overdue&as_of=${encodeURIComponent(asOf)}`),
          fetchJson("/reminders?status=pending"),
          fetchJson("/reminders?status=sent")
        ]);
        state.ledgerData = {
          all: allPayload.ledgers || [],
          open: openPayload.ledgers || [],
          due: duePayload.ledgers || [],
          overdue: overduePayload.ledgers || [],
          remindersPending: pendingPayload.reminders || [],
          remindersSent: sentPayload.reminders || []
        };
      } catch (error) {
        state.ledgerError = error.message || "台账接口加载失败";
      } finally {
        state.loadingLedgers = false;
        render();
      }
    }

    async function loadOADashboard() {
      state.loadingOA = true;
      state.oaError = "";
      render();
      try {
        state.oaData = await fetchJson("/integrations/oa");
      } catch (error) {
        state.oaError = error.message || "OA 同步接口加载失败";
      } finally {
        state.loadingOA = false;
        render();
      }
    }

    async function triggerOASync(scope = "all", retryRunId = null) {
      try {
        const payload = await fetchJson("/integrations/oa/sync", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            actor_id: "user_finance_01",
            scope,
            retry_run_id: retryRunId
          })
        });
        state.oaData = payload.dashboard;
        await loadProjectHub();
        render();
        showToast(retryRunId ? `已重试 ${payload.run.scope} 同步` : `已执行 ${payload.run.scope} 同步`);
      } catch (error) {
        showToast(error.message || "OA 同步执行失败");
      }
    }

    async function loadProjectHub() {
      state.loadingProjects = true;
      state.projectError = "";
      render();
      try {
        state.projectData = await fetchJson("/projects");
        const projects = state.projectData.projects || [];
        if (projects.length && !projects.some(item => item.id === state.selectedProjectId)) {
          state.selectedProjectId = projects[0].id;
        }
      } catch (error) {
        state.projectError = error.message || "项目归集接口加载失败";
      } finally {
        state.loadingProjects = false;
        render();
      }
    }

    async function submitProjectCreate() {
      if (!state.form.projectCode || !state.form.projectName) {
        showToast("请输入项目编码和项目名称");
        return;
      }
      try {
        const payload = await fetchJson("/projects", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            actor_id: "user_finance_01",
            project_code: state.form.projectCode,
            project_name: state.form.projectName
          })
        });
        state.projectData = payload.hub;
        state.selectedProjectId = payload.project.id;
        state.form.projectCode = "";
        state.form.projectName = "";
        render();
        showToast(`已创建项目 ${payload.project.project_name}`);
      } catch (error) {
        showToast(error.message || "创建项目失败");
      }
    }

    async function assignObjectToProject(objectType, objectId, projectId) {
      if (!projectId) {
        showToast("请选择项目");
        return;
      }
      try {
        const payload = await fetchJson("/projects/assign", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            actor_id: "user_finance_01",
            object_type: objectType,
            object_id: objectId,
            project_id: projectId,
            note: "通过项目归集页指定项目"
          })
        });
        state.selectedProjectId = payload.project.id;
        await Promise.all([loadProjectHub(), loadWorkbench(state.currentMonth), loadLedgerHub()]);
        showToast(`已将 ${objectType} 归属到项目 ${payload.project.project_name}`);
      } catch (error) {
        showToast(error.message || "项目归属失败");
      }
    }

        showToast("当前仍是样例财务数据，先导入真实发票 / 流水后再执行核销");
        return;
      }

        showToast(error.message || "内部抵扣失败");
      }

    function renderActionCell(row, sectionKey) {
      const buttons = [`<button class="mini-btn" data-action="detail" data-row="${row.id}">详情</button>`];
      if (sectionKey === "open") {
        if (row.type === "bank") {
          buttons.push(`<button class="mini-btn" data-action="relation" data-row="${row.id}">关联情况</button>`);
          buttons.push(`<button class="mini-select" data-action="exception" data-row="${row.id}">异常处理 ▾</button>`);
          buttons.push(`<button class="mini-btn danger" data-action="cancel" data-row="${row.id}">取消关联</button>`);
        } else {
          buttons.push(`<button class="mini-btn primary" data-action="confirm" data-row="${row.id}">确认关联</button>`);
          buttons.push(`<button class="mini-btn danger" data-action="exception" data-row="${row.id}">标记异常</button>`);
        }
      } else {
        buttons.push(`<button class="mini-btn danger" data-action="cancel" data-row="${row.id}">取消关联</button>`);
      }
      return `<div class="inline-actions">${buttons.join("")}</div>`;
    }

    function renderCell(row, column, sectionKey) {
      const key = column.key;
      if (key === "amount" || key === "debit" || key === "credit" || key === "taxAmount" || key === "totalWithTax") {
        return formatMoney(row[key]);
      }
      if (key === "relation" || key === "invoiceRelation") {
        return badgeHtml(row[key]);
      }
      if (key === "payAccount") {
        return `<span class="bank-pill">${row[key]}</span>`;
      }
      if (key === "actions") {
        return renderActionCell(row, sectionKey);
      }
      return row[key] || "—";
    }

    function renderPane(paneKey, sectionKey) {
      const data = getMonthBundle()[sectionKey][paneKey];
      const paneClass = paneKey === "oa" ? "oa" : paneKey === "bank" ? "bank" : "invoice";
      const title = paneKey === "oa" ? "OA" : paneKey === "bank" ? "银行流水" : "进项 / 销项发票";
      const footerText = paneKey === "oa"
        ? "OA 当前仍使用既有样例数据，银行与发票已切到真实接口。"
        : paneKey === "bank"
          ? "银行栏已接工作台接口，支持候选带入、异常处理与详情抽屉。"
          : "发票栏已接工作台接口，税额与价税合计来自真实后端模型。";
      const linkedIds = getSelectedLinkIds();

      const rowsHtml = data.map(row => {
        const selected = state.selectedRows[row.type].includes(row.id);
        const linked = !selected && linkedIds.size > 0 && linkedIds.has(row.caseId || row.candidateResultId);
        const rowClass = [
          sectionKey === "paired" ? "row-paired" : "row-open",
          selected ? "row-selected" : "",
          linked ? "row-linked" : ""
        ].filter(Boolean).join(" ");
        const cells = columns[paneKey].map(column => `<td>${renderCell(row, column, sectionKey)}</td>`).join("");
        return `<tr class="${rowClass}" data-row="${row.id}">${cells}</tr>`;
      }).join("");

      const headHtml = columns[paneKey].map(column => `<th>${column.label}</th>`).join("");

      return [

    async function updateLedgerStatus(ledgerId, status) {
      if (!hasLiveLedgerData()) {
        showToast("当前展示的是演示台账，生成真实核销动作后才可修改状态");
        return;
      }
      try {
        await fetchJson(`/ledgers/${ledgerId}/status`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            actor_id: "user_finance_01",
            status,
            note: status === "resolved" ? "通过台账页标记已解决" : "通过台账页转为跟进中"
          })
        });
        await loadLedgerHub();
        showToast(status === "resolved" ? "台账已标记为已解决" : "台账已转为跟进中");
      } catch (error) {
        showToast(error.message || "更新台账状态失败");
      }
    }

    async function runReminderBatch() {
      if (!hasLiveLedgerData()) {
        showToast("当前展示的是演示台账，生成真实台账后才可执行提醒");
        return;
      }
      try {
        const payload = await fetchJson("/reminders/run", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ as_of: getMonthEnd(state.currentMonth) })
        });
        await loadLedgerHub();
        showToast(`提醒任务已执行，发送 ${payload.sent_reminders.length} 条`);
      } catch (error) {
        showToast(error.message || "提醒执行失败");
      }
    }

    function seedTaxSelections() {
      const bundle = getMonthBundle();
      state.taxSelections = { output: {}, input: {} };
      bundle.tax.output.forEach(item => { state.taxSelections.output[item.id] = true; });
      bundle.tax.input.forEach((item, index) => { state.taxSelections.input[item.id] = index < 2; });
    }

    function getTaxTotals() {
      const bundle = getMonthBundle();
      const output = bundle.tax.output
        .filter(item => state.taxSelections.output[item.id])
        .reduce((sum, item) => sum + item.taxAmount, 0);
      const input = bundle.tax.input
        .filter(item => state.taxSelections.input[item.id])
        .reduce((sum, item) => sum + item.taxAmount, 0);
      return {
        output,
        input,
        deductible: Math.min(output, input),
        payable: Math.max(output - input, 0),
        carryForward: Math.max(input - output, 0)
      };
    }

    function renderTaxTable(kind, rows) {
      const checkedMap = state.taxSelections[kind];
      const head = kind === "output"
        ? "<tr><th>纳入</th><th>开票日期</th><th>购方名称</th><th>发票号码</th><th>税额</th><th>价税合计</th><th>类型</th></tr>"
        : "<tr><th>抵扣</th><th>开票日期</th><th>销方名称</th><th>发票号码</th><th>税额</th><th>价税合计</th><th>风险</th></tr>";
      const body = rows.map(item => {
        return kind === "output"
          ? `<tr><td><input type="checkbox" data-tax-kind="${kind}" data-tax-id="${item.id}" ${checkedMap[item.id] ? "checked" : ""}></td><td>${item.issueDate}</td><td>${item.buyer}</td><td>${item.invoiceNo}</td><td>${formatMoney(item.taxAmount)}</td><td>${formatMoney(item.total)}</td><td>${item.type}</td></tr>`
          : `<tr><td><input type="checkbox" data-tax-kind="${kind}" data-tax-id="${item.id}" ${checkedMap[item.id] ? "checked" : ""}></td><td>${item.issueDate}</td><td>${item.seller}</td><td>${item.invoiceNo}</td><td>${formatMoney(item.taxAmount)}</td><td>${formatMoney(item.total)}</td><td>${item.risk}</td></tr>`;
      }).join("");
      return `<div class="table-wrap"><table><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
    }

        `<div class="tax-panel"><div class="tax-panel-head"><span>进项票税金清单</span><span>${bundle.tax.input.length} 张</span></div>${renderTaxTable("input", bundle.tax.input)}</div>`,
        `<div class="tax-panel"><div class="tax-panel-head"><span>抵扣结果</span><span>按月测算</span></div><div class="tax-result">
          <div class="result-box"><strong>公式</strong><div class="detail-value">销项税额 - 进项税额 = 应纳税额；若结果小于 0，则转为留抵税额。</div></div>
          <div class="result-box"><strong>本月应纳税额</strong><div class="big">${formatMoney(total.payable)}</div></div>
          <div class="result-box"><strong>本月留抵税额</strong><div class="big">${formatMoney(total.carryForward)}</div></div>
          <button id="taxComputeBtn" class="primary-btn">生成本月抵扣结果</button>
        </div></div>`,
        "</div>",
        "</div>"
      ].join("");

      page.querySelector("#backWorkbenchBtn").addEventListener("click", () => {
        state.currentView = "workbench";
        render();
      });

      page.querySelector("#taxOABtn").addEventListener("click", async () => {
        state.currentView = "oa";
        render();
        await loadOADashboard();
      });

      page.querySelector("#taxProjectBtn").addEventListener("click", async () => {
        state.currentView = "project";
        render();
        await loadProjectHub();
      });

      page.querySelector("#taxLedgerBtn").addEventListener("click", async () => {
        state.currentView = "ledger";
        render();
        await loadLedgerHub();
      });

      page.querySelector("#taxMonth").addEventListener("change", async event => {
        state.currentMonth = event.target.value || "2026-03";
        seedTaxSelections();
        render();
        await Promise.all([loadWorkbench(state.currentMonth), loadLedgerHub()]);
      });

      page.querySelectorAll("[data-tax-kind]").forEach(input => {
        input.addEventListener("change", () => {
          state.taxSelections[input.dataset.taxKind][input.dataset.taxId] = input.checked;
          renderTaxPage();
        });
      });

      page.querySelector("#taxComputeBtn").addEventListener("click", () => {
        const totalNow = getTaxTotals();
        showToast(`已生成 ${state.currentMonth} 税金抵扣结果，应纳：${formatMoney(totalNow.payable)}，留抵：${formatMoney(totalNow.carryForward)}`);
      });
    }

    function attachSplitterEvents(root) {
      root.querySelectorAll(".splitter").forEach(splitter => {
        splitter.addEventListener("pointerdown", event => {
          const index = Number(splitter.dataset.splitter);
          const config = index === 0 ? ["oa", "bank"] : ["bank", "invoice"];
          const [leftKey, rightKey] = config;
          if (!state.visible[leftKey] || !state.visible[rightKey]) return;

          const startX = event.clientX;
          const container = splitter.parentElement;
          const width = container.getBoundingClientRect().width;
          const startLeft = state.widths[leftKey];
          const startRight = state.widths[rightKey];
          const total = startLeft + startRight;
          const snap = 4;

          function onMove(moveEvent) {
            const delta = ((moveEvent.clientX - startX) / width) * 100;
            let nextLeft = Math.max(0, Math.min(total, startLeft + delta));
            if (nextLeft < snap) nextLeft = 0;
            if (total - nextLeft < snap) nextLeft = total;
            const nextRight = total - nextLeft;
            state.widths[leftKey] = nextLeft;
            state.widths[rightKey] = nextRight;
            document.querySelectorAll(".tri-layout").forEach(layout => {
              layout.style.gridTemplateColumns = composeGridTemplate();
            });
          }

          function onUp() {
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
          }

          window.addEventListener("pointermove", onMove);
          window.addEventListener("pointerup", onUp);
        });
      });
    }

    function render() {
      sanitizeSelections();
      document.getElementById("workbenchPage").classList.toggle("active", state.currentView === "workbench");
      document.getElementById("oaPage").classList.toggle("active", state.currentView === "oa");
      document.getElementById("projectPage").classList.toggle("active", state.currentView === "project");
      document.getElementById("ledgerPage").classList.toggle("active", state.currentView === "ledger");
      document.getElementById("taxPage").classList.toggle("active", state.currentView === "tax");
      renderWorkbench();
      renderOAPage();
      renderProjectPage();
      renderLedgerPage();
      renderTaxPage();
      renderContextPanel();
      renderDrawer();
    }

    seedTaxSelections();
    render();
    loadWorkbench(state.currentMonth);
    loadOADashboard();
    loadProjectHub();
    loadLedgerHub();
  </script>
</body>
</html>
